name: Robot Auto-Update MetOcean

on:
  schedule:
    # Menggunakan "jalur tikus" di menit ke-17 (08:17 WIB) agar tidak terjebak macet server
    - cron: '17 1 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Tarik Kodingan
        # Kunci Anti-Error: Pakai kode SHA panjang pengganti versi v4
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Siapkan Mesin Python
        # Kunci Anti-Error: Pakai kode SHA panjang pengganti versi v5
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b
        with:
          python-version: '3.10'

      - name: Install Library Oseanografi
        run: |
          pip install xarray ecmwf-opendata cfgrib netCDF4 copernicusmarine 

      - name: Jalankan Downloader Hybrid
        run: |
          python update_udara_lokal.py
          python update_data_hybrid.py

      - name: Simpan & Kirim ke Server
        run: |
          git config --global user.name "Robot ITB"
          git config --global user.email "robot@github.com"
          git add data_nc/
          git commit -m "🤖 Auto-update data Cuaca & Laut harian" || echo "Tidak ada data baru"
          git push